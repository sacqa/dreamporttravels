<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Offline — DreamPort Travels</title>
<meta name="theme-color" content="#0f3460" />
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    max-width: 460px; width: 100%; text-align: center;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 40px 28px;
    backdrop-filter: blur(8px);
  }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 999px;
    background: rgba(233, 69, 96, 0.15); color: #ffb4be;
    font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; margin-bottom: 20px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #e94560; animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  h1 { font-size: 28px; margin: 0 0 12px; font-weight: 700; }
  p { color: rgba(255,255,255,0.78); line-height: 1.55; margin: 0 0 24px; font-size: 15px; }
  .links { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 24px; }
  .links a {
    padding: 8px 14px; border-radius: 999px;
    background: rgba(255,255,255,0.08); color: #fff;
    text-decoration: none; font-size: 13px; font-weight: 500;
    border: 1px solid rgba(255,255,255,0.12);
  }
  .links a:hover { background: rgba(255,255,255,0.14); }
  button {
    width: 100%; padding: 14px; border: 0; border-radius: 12px;
    background: #e94560; color: #fff; font-size: 15px; font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #d63951; }
  .status { margin-top: 16px; font-size: 12px; color: rgba(255,255,255,0.55); }
  .brand { margin-bottom: 24px; font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">✈️ DreamPort Travels</div>
    <div class="badge"><span class="dot"></span> Offline</div>
    <h1>You're offline</h1>
    <p>This page isn't available without a connection. Tap a link below to open a page you've already visited, or retry once you're back online.</p>
    <div class="links">
      <a href="/">Home</a>
      <a href="/visas">Visas</a>
      <a href="/umrah">Umrah</a>
      <a href="/contact">Contact</a>
    </div>
    <button onclick="location.reload()">Retry connection</button>
    <div class="status" id="s">Status: offline</div>
  </div>
  <script>
    function update() {
      var s = document.getElementById('s');
      if (navigator.onLine) { s.textContent = 'Back online — tap retry'; s.style.color = '#86efac'; }
      else { s.textContent = 'Status: offline'; }
    }
    window.addEventListener('online', update);
    window.addEventListener('offline', update);
    update();
  </script>
</body>
</html>
